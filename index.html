<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>365 Dias ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Delius+Swash+Caps&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#000000,#111111,#000000);
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

h1{
font-family:'Dancing Script',cursive;
font-size:70px;
margin-bottom:10px;
}

h2{
margin-top:40px;
font-weight:600;
}

p{
font-size:20px;
line-height:1.6;
}

#contador{
font-size:32px;
margin-top:20px;
font-weight:600;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.galeria img{
width:100%;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.4s;
}

.galeria img:hover{
transform:scale(1.05);
}

.botao{
margin-top:40px;
background:white;
color:#ff4d6d;
border:none;
padding:15px 35px;
font-size:22px;
border-radius:40px;
cursor:pointer;
transition:0.3s;
}

.botao:hover{
transform:scale(1.1);
}

footer{
margin-top:80px;
font-size:18px;
opacity:0.8;
}

/* corações */

.coracao{
position:fixed;
top:-10px;
font-size:20px;
animation:cair linear infinite;
}

@keyframes cair{
0%{
transform:translateY(-10px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Eu te amo ❤️</h1>

<p>
Desde que você entrou na minha vida, tudo ficou mais bonito.
Cada momento ao seu lado é especial.
</p>

<h2>Você está me aguentando há:</h2>

<div id="contador"></div>

<h2>Fotinhos nossas, hihi</h2>

<div class="galeria">

<img src="foto1.JPG">
<img src="foto2.JPG">
<img src="foto3.JPG">
<img src="foto4.JPG">
<img src="foto5.JPG">
<img src="foto6.JPG">
<img src="foto7.JPG">
<img src="foto8.JPG">
<img src="foto9.JPG">

</div>

<button class="botao" onclick="surpresa()">
Clica nessa porrinha
</button>

<footer>
Feito com amor ❤️
</footer>

</div>

<script>

var dataInicio = new Date("2025-03-28")

function atualizar(){

var agora = new Date()
var diferenca = agora - dataInicio

var dias = Math.floor(diferenca / (1000*60*60*24))
var horas = Math.floor((diferenca/(1000*60*60))%24)
var minutos = Math.floor((diferenca/(1000*60))%60)
var segundos = Math.floor((diferenca/1000)%60)

document.getElementById("contador").innerHTML =
dias + " dias " +
horas + " horas " +
minutos + " minutos " +
segundos + " segundos ❤️"

}

setInterval(atualizar,1000)

function surpresa(){

alert("Você é a melhor coisa que já aconteceu na minha vida ❤️")

}

/* corações caindo */

function criarCoracao(){

const coracao = document.createElement("div")

coracao.classList.add("coracao")

coracao.innerHTML="❤️"

coracao.style.left=Math.random()*100+"vw"

coracao.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(coracao)

setTimeout(()=>{
coracao.remove()
},5000)

}

setInterval(criarCoracao,300)

</script>

</body>
</html>
